<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Login</title>
</head>
<body>
    <nav class="navbar">
         <div class="nav__logo">
          <a href="#" class="logo">Adit<span>Jobs</span></a>
        </div>
        <ul class="nav-links">
            <li><a class="text-nav" href="index.html">Home</a></li>
        </ul>
    </nav>
    <div class="form-login">
        <form action="" method="post">
            <h2>Login</h2>
            <div class="input-email">
                <label for="email">Email:</label>
                <input type="email" id="email" name="Email" required>
            </div>
            <div class="input-password"> 
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="button-login">Login</button>
            <div class="link_register">
                <p class="link-register">Don't have an account?</p>
                <a class="register-here" href="register.html">Register here</a>
                <a href="forgot_password.html" class="link-forgot-password">Forgot Password?</a>
            </div>
            <div class="form-checkbox">
                <input class="form-check-input" type="checkbox" id="rememberMe" unchecked />
                <label for="rememberMe"> Remember Me </label>
            </div>
            <div class="social-login">
                <p>Login with:</p>
                <div class="icons">
                    <a href="#" class="social-icon" title="Login with Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-icon" title="Login with Google"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-icon" title="Login with Twitter"><i class="fab fa-twitter"></i></a>
                </div>
        </form>
    </div>
</body>
</html>
