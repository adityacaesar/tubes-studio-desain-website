<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
    <script src="register.js"></script>
    <title>Register</title>
</head>
<body class="register-body">
    <div class="background-image">
        <img src="assets/background_dan_ikon_background/register-bg.jpg" alt="Background Image" class="bg-image">
    </div>
    <nav class="navbar">
        <div class="logo">
             <a class="logo">Adit<span>Jobs</span></a>
        </div>
        <div class="nav-links">
            <a class="text-nav" href="index.html">Home</a>
        </div>
    </nav>
    <div class="container">
        <form action="#" method="post">
            <h2 class="text-register">Register</h2>
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="input-group">
                <label for="password">Confirm Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" onclick="submitRegister()" class="button-register">Register</button>
            <p class="login-link">Already have an account? <a class="text" href="login.html">Login here</a></p>
            
            <p class="social-login">Or register with:</p>
            <div class="social-icons">
                <a href="#" class="social-icon" title="Register with Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon" title="Register with Google"><i class="fab fa-google"></i></a>
                <a href="#" class="social-icon" title="Register with Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-icon" title="Register with LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            </div>
          <div class="form-check">
                <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="defaultCheckbox"
                title="Default checkbox"
                required>
                <label for="defaultCheckbox">
                    By registering, you agree to our
                    <a class="text" href="#">Terms of Service</a> and
                    <a class="text" href="#">Privacy Policy</a>.
                </label>
            </div>
        </form>
    </div>
</body>
</html>
